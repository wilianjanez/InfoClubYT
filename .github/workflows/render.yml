name: render-info-club

# Disparado pelo Make.com via POST em:
#   https://api.github.com/repos/<owner>/<repo>/dispatches
#   { "event_type": "render", "client_payload": { ...props... } }
#
# Modo automático (tema): client_payload = { "row_id": "...", "tema": "..." }
# Modo manual (URLs): client_payload com audio_longo_url, audio_short_url, clipes_longo[], clipes_short[]
on:
  schedule:
    # Roda todos os dias às 09:00 horário de Brasília (12:00 UTC)
    - cron: '0 12 * * *'
  repository_dispatch:
    types: [render]
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON de props (para teste manual, opcional)'
        required: false

concurrency:
  group: render-${{ github.event.client_payload.row_id || github.run_id }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write   # necessário para git push da planilha atualizada
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar ffmpeg e libs do Chrome (Remotion)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            libnss3 libdbus-1-3 libatk1.0-0 libgbm1 libasound2t64 \
            libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libxkbcommon0 libpango-1.0-0 libcairo2 \
            fonts-liberation || \
          sudo apt-get install -y ffmpeg libnss3 libdbus-1-3 libatk1.0-0 \
            libgbm1 libasound2 libatk-bridge2.0-0 libcups2 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 libpango-1.0-0 \
            libcairo2 fonts-liberation

      - name: Instalar dependencias
        run: npm install

      - name: Gravar props.json
        env:
          PAYLOAD: ${{ github.event.client_payload && toJSON(github.event.client_payload) || github.event.inputs.payload || '{}' }}
        run: |
          printf '%s' "${PAYLOAD:-{}}" > props.json
          echo "=== props.json inicial ==="
          cat props.json
          echo ""

      # ── Fase de criação de conteúdo (modo automático com "tema") ──────────

      - name: Selecionar tema da planilha
        run: npm run select-theme

      - name: Verificar secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY: ${#ANTHROPIC_API_KEY} chars"
          echo "ELEVENLABS_API_KEY: ${#ELEVENLABS_API_KEY} chars"

      - name: Gerar roteiro com IA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
        run: npm run generate-content

      - name: Gerar narração (ElevenLabs)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID_LONGO: ${{ secrets.ELEVENLABS_VOICE_ID_LONGO }}
          ELEVENLABS_VOICE_ID_SHORT: ${{ secrets.ELEVENLABS_VOICE_ID_SHORT }}
        run: npm run generate-audio

      # ── Fase de assets (modo manual OU complemento do automático) ─────────

      - name: Buscar fotos (Pexels)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: npm run fetch-clips

      - name: Baixar audio e clipes (modo manual)
        run: npm run fetch

      # ── Render ────────────────────────────────────────────────────────────

      - name: Gerar legendas (whisper)
        env:
          WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'small' }}
        run: npm run transcribe

      - name: Renderizar videos
        run: npm run render

      - name: Gerar thumbnails
        run: npm run render-thumbnail

      # ── Distribuição ──────────────────────────────────────────────────────

      - name: Subir no Google Drive
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: npm run upload

      - name: Publicar no YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
        run: npm run upload-youtube

      - name: Atualizar planilha de temas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run update-sheet

      - name: Avisar o Make
        env:
          MAKE_CALLBACK_URL: ${{ secrets.MAKE_CALLBACK_URL }}
        run: npm run notify

      - name: Guardar videos como artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.event.client_payload.row_id || github.run_id }}
          path: out/*.mp4
          retention-days: 5
          if-no-files-found: ignore
